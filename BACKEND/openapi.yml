openapi: 1.1.0
info:
  title: API de Autenticação com Node.js com foco em Typescript, Swagger e senha com Hash via bycript 
  description: API de estudo para gerenciamento de usuários e autenticação JWT (Json Web Token).
  version: 1.1.0

servers:
  - url: http://localhost:3000/api
    description: Servidor de Desenvolvimento (localhost yet)

# Definição de Segurança (Para o cadeado do Swagger)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # Definição dos Modelos (Equivalente aos DTOs)
  schemas:
    LoginDto:
      type: object
      required: [email, password]
      properties:
        email: { type: string, example: "user@example.com" }
        password: { type: string/int, example: "Lucas123456" }
    
    RegisterDto:
      type: object
      required: [nome, email, senha]
      properties:
        nome: { type: string }
        email: { type: string }
        senha: { type: string }

paths:
  /auth/register:
    post:
      summary: Cadastrar um novo usuário
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterDto' }
      responses:
        '201': { description: 'Usuário criado com sucesso ✅' }

  /auth/login:
    post:
      summary: Autenticar usuário
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginDto' }
      responses:
        '200': 
          description: Sucesso ✅
          content:
            application/json:
              example: { "token": "eyJhbG..." }

  /auth/profile:
    get:
      summary: Consultar dados do perfil do usuário
      tags: [Auth]
      security:
        - bearerAuth: [ ]
      responses:
        '200': 
          description: Dados retornados✅
        '401': 
          description: Não foi autorizado❌